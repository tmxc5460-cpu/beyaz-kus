<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Beyaz Kuş - İkon Oluşturucu</title>
</head>
<body>
    <h1>İkon Oluşturuluyor...</h1>
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
    
    <script>
        // 192x192 ikon
        const canvas192 = document.getElementById('canvas192');
        const ctx192 = canvas192.getContext('2d');
        
        // Gradient arka plan
        const gradient192 = ctx192.createLinearGradient(0, 0, 192, 192);
        gradient192.addColorStop(0, '#667eea');
        gradient192.addColorStop(1, '#764ba2');
        ctx192.fillStyle = gradient192;
        ctx192.fillRect(0, 0, 192, 192);
        
        // Beyaz kuş emoji
        ctx192.font = 'bold 120px Arial';
        ctx192.textAlign = 'center';
        ctx192.textBaseline = 'middle';
        ctx192.fillText('🕊️', 96, 96);
        
        // 512x512 ikon
        const canvas512 = document.getElementById('canvas512');
        const ctx512 = canvas512.getContext('2d');
        
        const gradient512 = ctx512.createLinearGradient(0, 0, 512, 512);
        gradient512.addColorStop(0, '#667eea');
        gradient512.addColorStop(1, '#764ba2');
        ctx512.fillStyle = gradient512;
        ctx512.fillRect(0, 0, 512, 512);
        
        ctx512.font = 'bold 320px Arial';
        ctx512.textAlign = 'center';
        ctx512.textBaseline = 'middle';
        ctx512.fillText('🕊️', 256, 256);
        
        // İndirme linkleri oluştur
        setTimeout(() => {
            // 192x192
            canvas192.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'icon-192.png';
                a.textContent = 'İndir: icon-192.png';
                a.style.display = 'block';
                a.style.margin = '10px';
                document.body.appendChild(a);
            });
            
            // 512x512
            canvas512.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'icon-512.png';
                a.textContent = 'İndir: icon-512.png';
                a.style.display = 'block';
                a.style.margin = '10px';
                document.body.appendChild(a);
            });
            
            document.body.innerHTML += '<h2>✅ İkonlar hazır! Yukarıdaki linklere tıklayarak indirin.</h2>';
        }, 500);
    </script>
</body>
</html>
